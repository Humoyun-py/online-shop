{% extends 'base.html' %}
{% load static %}

{% block title %}Ro'yxatdan o'tish - KarmaShop{% endblock %}

{% block content %}

<section class="login_box_area py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="login-form p-4 border rounded shadow-sm">
                    <h3 class="text-center mb-4">Ro'yxatdan o'tish</h3>
                    <p class="text-center text-muted mb-4">Yangi hisob yarating</p>

                    <form method="POST" action="{% url 'register' %}">
                        {% csrf_token %}

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Ism <span class="text-danger">*</span></label>
                                    <input type="text" name="first_name" class="form-control"
                                        placeholder="Ismingiz" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Familiya</label>
                                    <input type="text" name="last_name" class="form-control"
                                        placeholder="Familiyangiz">
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Foydalanuvchi nomi <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <span class="input-group-text"><i class="fa fa-user"></i></span>
                                </div>
                                <input type="text" name="username" class="form-control"
                                    placeholder="Username" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Email manzil</label>
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <span class="input-group-text"><i class="fa fa-envelope"></i></span>
                                </div>
                                <input type="email" name="email" class="form-control"
                                    placeholder="email@example.com">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Parol <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <span class="input-group-text"><i class="fa fa-lock"></i></span>
                                </div>
                                <input type="password" name="password1" class="form-control"
                                    placeholder="Parol (kamida 6 ta belgi)" required minlength="6">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Parolni tasdiqlang <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <span class="input-group-text"><i class="fa fa-lock"></i></span>
                                </div>
                                <input type="password" name="password2" class="form-control"
                                    placeholder="Parolni qayta kiriting" required>
                            </div>
                        </div>

                        <button type="submit" class="btn primary-btn w-100 mb-3">
                            <i class="fa fa-user-plus mr-2"></i>Ro'yxatdan o'tish
                        </button>

                        <p class="text-center mb-0">
                            Hisobingiz bormi?
                            <a href="{% url 'login' %}" class="text-primary">Kiring</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
